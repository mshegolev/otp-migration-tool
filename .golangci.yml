version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      # fmt.Fprint* to os.Stdout/Stderr and file Close in defer return errors
      # that have no useful recovery path for a CLI tool. Allowlist by name.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (*os.File).Close
  exclusions:
    paths:
      - internal/migration/pb     # generated protobuf code
      - examples

formatters:
  enable:
    - gofmt
