version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  exclusions:
    paths:
      - internal/migration/pb     # generated protobuf code
      - examples

# In golangci-lint v2 "formatters" are a separate category from linters.
formatters:
  enable:
    - gofmt
