// Unofficial protobuf definition of Google Authenticator Migration exports.
// Based on Google Authenticator 5.10, originally by Chris van Marle (2020-06-04).
// Wire format is identical between proto2/proto3 for the fields used here, so
// proto3 is used to keep generated Go code simple (no pointer-wrapped scalars).

syntax = "proto3";

option go_package = "github.com/mshegolev/otp-migration-tool/internal/migration/pb;pb";

message MigrationPayload {
    repeated OtpParameters otp_parameters = 1;
    int32 version = 2;
    int32 batch_size = 3;
    int32 batch_index = 4;
    int32 batch_id = 5;
}

message OtpParameters {
    bytes secret = 1;
    string name = 2;
    string issuer = 3;
    Algorithm algorithm = 4;
    DigitCount digits = 5;
    OtpType type = 6;
    int64 counter = 7;
}

enum Algorithm {
    ALGORITHM_TYPE_UNSPECIFIED = 0;
    ALGORITHM_SHA1 = 1;
    ALGORITHM_SHA256 = 2;
    ALGORITHM_SHA512 = 3;
    ALGORITHM_MD5 = 4;
}

enum DigitCount {
    DIGIT_COUNT_UNSPECIFIED = 0;
    DIGIT_COUNT_SIX = 1;
    DIGIT_COUNT_EIGHT = 2;
}

enum OtpType {
    OTP_TYPE_UNSPECIFIED = 0;
    OTP_TYPE_HOTP = 1;
    OTP_TYPE_TOTP = 2;
}
